<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../assets/icons/lamp-red.svg" type="image/x-icon">
    <link rel="stylesheet" href="../../styles/table.css">
    <title>VladSchool</title>
    <style>
        :root {
            --mainColor: #FF383C;
            --mainColorT: #FF383C33;
        }
    </style>
</head>
<body>
    <input type="checkbox" id="iToggle" hidden>
    <aside>
        <section class="asideHeader">
            <div>
                <h2>ADMINISTRADOR</h2>
                <p>Nicolas Vlad</p>
            </div>
            <label for="iToggle"><img src="../../assets/icons/toggle.svg"></label>
        </section>

        <nav>
            <h2>GERAL</h2>
            <a href="discipline.html" style="background-color: var(--mainColorT);">
                <img src="../../assets/icons/aside.svg">
                <p>alunos</p>
            </a>
            
            <a href="teachers.html">
                <img src="../../assets/icons/aside.svg">
                <p>professores</p>
            </a>
            
            <a href="dashboard.html">
                <img src="../../assets/icons/aside.svg">
                <p>dashboard</p>
            </a>
        </nav>

        <section class="asideFooter">
            <img src="../../assets/icons/lamp-red.svg">
            <h1>VladSchool</h1>
        </section>
    </aside>

    <main>
        <header>
            <label for="iToggle" class="labelToggle"> <img src="../../assets/icons/menu.svg"></label>
            <input type="text" id="nome do aluno" placeholder="nome do aluno">
            <button onclick="addStud.showModal()">adicionar</button>
            <select id="sTurmas">
                <option selected hidden>Turmas</option>
                <option value="all">Todas</option>
                <option value="6A">6ºA</option>
                <option value="7A">7ºA</option>
                <option value="8A">8ºA</option>
                <option value="9A">9ºA</option>
                <option value="1A">1ºA</option>
                <option value="2A">2ºA</option>
                <option value="3A">3ºA</option>
            </select>
        </header>
        
        <table class="prof">
            <tr class="thead">
                <th>nome</th>
                <th>turma</th>
                <th>nota 01</th>
                <th>nota 02</th>
                <th>média</th>
                <th>status</th>
                <th>observações</th>
            </tr>
            <tr>
                <td>aah</td>
            </tr>
        </table>
    </main>


    <dialog id="addStud">
        <form method="post">
            <div>
                <label for="iName">nome</label>
                <input type="text" id="iName" autocapitalize="">
            </div>
            <div>
                <label for="iClass">turma</label>
                <input type="text" id="iClass">
            </div>
            <div>
                <label for="iReg">matrícula</label>
                <input type="text" id="iReg" maxlength="10">
            </div>
            <input type="submit" value="adicionar">
        </form>
    </dialog>

    <dialog id="whatToDo">
        <p>o que você deseja fazer?</p>
        <section>
            <div>
                <img src="../../assets/icons/trash.svg">
                <p>excluir</p>
            </div>
            <div>
                <img src="../../assets/icons/trash.svg">
                <p>editar</p>
            </div>
        </section>
    </dialog>

    <script src="../../scripts/table.js"></script>
</body>
</html>
