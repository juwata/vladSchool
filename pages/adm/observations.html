<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../assets/icons/lamp-red.svg" type="image/x-icon">
    <link rel="stylesheet" href="../../styles/observations.css">
    <link rel="stylesheet" href="../../styles/popUpAdd.css">
    <link rel="stylesheet" href="../../styles/popUpEditarExcluir.css">  
    <script src="../../scripts/observations.js" type="module" defer></script>
    <script src="../../scripts/pop-up/popUpAddObservacao.js" type="module" defer></script>
    <script src="../../scripts/pop-up/popUpEditarExcluirObs.js" type="module" defer></script>
    <title>VladSchool</title>
    <style>
        :root {
            --mainColor: #FF383C;
            --mainColorT: #FF383C33;
        }
    </style>
</head>
<body>
    <input type="checkbox" id="iToggle" hidden checked>
    <aside>
        <section class="asideHeader">
            <div>
                <h2>ADMINISTRADOR</h2>
                <p></p>
            </div>
            <label for="iToggle"><img src="../../assets/icons/toggle.svg"></label>
        </section>

        <nav>
            <h2>GERAL</h2>
            <a href="chooseNotas.html" >
                <img src="../../assets/icons/aside.svg">
                <p>notas</p>
            </a>
            <a href="chooseObservations.html" style="background-color: var(--mainColorT);">
                <img src="../../assets/icons/aside.svg">
                <p>observações</p>
            </a>
            <a href="teachers.html">
                <img src="../../assets/icons/aside.svg">
                <p>professores</p>
            </a>
            
            <a href="dashboard.html" >
                <img src="../../assets/icons/aside.svg">
                <p>dashboard</p>
            </a>
        </nav>

        <section class="asideFooter">
            <img src="../../assets/icons/lamp-red.svg">
            <h1>VladSchool</h1>
        </section>
    </aside>

    <header>
        <label for="iToggle" class="labelToggle"><img src="../../assets/icons/menu.svg"></label>
        <button id="openPopupAdd">Adicionar</button>
    </header>

    <main>
    </main>
    <div class="overlayAdicionar" id="overlayAdicionar">
        <div class="popupAdicionar">
            <form>
                <label for="obs">observação</label>
                <textarea id="obs" name="obsevacao" placeholder="observação"></textarea>

                <button type="submit" class="btn-addUp">adicionar</button>
            </form>
        </div>
    </div>
    <div class="overlayEditarExcluir" id="overlayEditarExcluir" >
        <div class="popupEditarExcluir" >
            <p>O que você deseja fazer?</p>
        
            <div class="actions">
                <div class="action">
                    <button class="btn delete">
                        <img src="../../assets/images/icon-trash.png" alt="Excluir">
                    </button>
                    <span>Excluir</span>
                </div>
        
                <div class="action">
                    <button class="btn edit">
                        <img src="../../assets/images/edit.png" alt="Editar">
                    </button>
                    <span>Editar</span>
                </div>
            </div>
        </div>
    </div>
    <div class="overlayEditar" id="overlayEditar">
        <div class="popupEditar">
            <form>
                <label for="obs">observação</label>
                <textarea id="obs" name="obsevacao" placeholder="observação"></textarea>

                <button type="submit" class="btn-edit" id="btn-edit" >editar</button>
            </form>
        </div>
    </div>
</body>
</html>
