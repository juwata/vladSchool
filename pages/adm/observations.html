<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../assets/icons/lamp-red.svg" type="image/x-icon">
    <link rel="stylesheet" href="../../styles/area/observations.css">
    <script src="../../scripts/observations/observations.js" type="module" defer></script>
    <script type="module" src="../../scripts/observations/addObservation.js" defer></script>
    <script type="module" src="../../scripts/observations/excludeObsevation.js"></script>
    <script type="module" src="../../scripts/observations/editObservation.js"></script>
    <title>VladSchool</title>
    <style>
        :root {
            --mainColor: #FF383C;
            --mainColorT: #FF383C33;
        }
    </style>
</head>
<body>
    <input type="checkbox" id="iToggle" hidden checked>
    <aside>
        <section class="asideHeader">
            <div>
                <h2>ADMINISTRADOR</h2>
                <p></p>
            </div>
            <label for="iToggle"><img src="../../assets/icons/toggle.svg"></label>
        </section>

        <nav>
            <h2>GERAL</h2>
            <a href="chooseNotas.html" >
                <img src="../../assets/icons/aside.svg">
                <p>notas</p>
            </a>
            <a href="chooseObservations.html" style="background-color: var(--mainColorT);">
                <img src="../../assets/icons/aside.svg">
                <p>observações</p>
            </a>
            <a href="prof.html">
                <img src="../../assets/icons/aside.svg">
                <p>professores</p>
            </a>
            
            <a href="dashboard.html" >
                <img src="../../assets/icons/aside.svg">
                <p>dashboard</p>
            </a>
        </nav>

        <section class="asideFooter">
            <img src="../../assets/icons/lamp-red.svg">
            <h1>VladSchool</h1>
        </section>
    </aside>

    <header>
        <label for="iToggle" class="labelToggle"><img src="../../assets/icons/menu.svg"></label>
        <button onclick="addObs.showModal()">adicionar</button>
    </header>

    <main>
    </main>
    <dialog id="addObs">
        <form method="post">
            <div>
                <label for="iObs">observação</label>
                <textarea id="iObs" name="newObs"></textarea>
            </div>
            <input type="submit" value="adicionar">
        </form>
    </dialog>

    <dialog id="whatToDo">
        <h3>o que você deseja fazer?</h3>
        <section>
            <a onclick="editObs.showModal(); carregarObs()">
                <div><img src="../../assets/icons/edit.svg"></div>
                <p>editar</p>
            </a>
            <a onclick="excludeObs.showModal()">
                <div><img src="../../assets/icons/trash.svg"></div>
                <p>excluir</p>
            </a>
        </section>
    </dialog>
    <dialog id="editObs" onmouseenter="whatToDo.close()">
        <form method="post">
            <div>
                <label for="iObs">observação</label>
                <textarea id="iObs" name="editObs"></textarea>
            </div>
            <input type="submit" value="editar">
        </form>
    </dialog>

    <dialog id="excludeObs" onmouseenter="whatToDo.close()">
        <form method="post">
            <h3>tem certeza?</h3>
            <div>
                <input type="button" value="sim" onclick="excluirObs()">
                <input type="button" value="não" onclick="excludeObs.close()">
            </div>
        </form>
    </dialog>
</body>
</html>
