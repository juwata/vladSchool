<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/icons/lamp-purple.svg" type="image/x-icon">
    <link rel="stylesheet" href="../styles/forms.css">
    <title>VladSchool | Login</title>
</head>
<body>
    <section>
        <div>
            <h1>Login</h1>
            <p>seja bem vindo à VladSchool</p>
        </div>
        <a href="signup.html" class="signup">novo aqui? faça o seu cadastro</a>
    </section>

    <form method="post">
        <div>
            <label for="iEmail">email</label>
            <input type="email" id="iEmail" placeholder="seu@email.com" required autocomplete="email" autofocus>
        </div>

        <div>
            <label for="iPasswd">senha</label>
            <input type="password" id="iPasswd" placeholder="senha" required autocomplete="current-password">
        </div>

        <div>
            <input type="submit" value="logar">
            <a href="signup.html" class="forgot">esqueceu a senha?</a>
        </div>
    </form>

    <script src="/scripts/forms.js"></script>
</body>
</html>
