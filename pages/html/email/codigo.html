<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/icons/lamp-purple.svg" type="image/x-icon">
    <link rel="stylesheet" href="codigo.css">
    <title>VladSchool | Login</title>
</head>
<body>
    <section>
        <div>
            <h1 style="margin-bottom: 10px;">Recuperar Senha</h1>
            <p  class="signup" id="rec">Digite seu email para enviar o código de recuperação</p>
        </div>
    </section>

    <form method="get" action="" onsubmit="verificar(event)">    
        <div>
            <label for="cod-1">Código de verificação</label>
            <div class="code-input-container">
                <input type="text" id="cod-1" class="code-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" required autocomplete="off" autofocus>
                <input type="text" id="cod-2" class="code-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" required autocomplete="off">
                <input type="text" id="cod-3" class="code-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" required autocomplete="off">
                <input type="text" id="cod-4" class="code-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" required autocomplete="off">
                <input type="text" id="cod-5" class="code-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" required autocomplete="off">
                <input type="text" id="cod-6" class="code-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" required autocomplete="off">
            </div>
        </div>
    
        <div>
            <input type="submit" value="validar código">
        </div>
    </form> 

    <script type="module" src="./codigo.js"></script>
</body>
</html>
